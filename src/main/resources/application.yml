server:
  port: 8082

spring:
  application:
    name: institute-connect
  datasource:
    url: jdbc:h2:mem:instituteconnectdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

jwt:
  secret: aW5zdGl0dXRlLWNvbm5lY3Qtc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbg==
  expiration: 900000  # 15 minutes

logging:
  level:
    com.instituteconnect: DEBUG
    org.springframework.security: INFO

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
